<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --card: #12121a;
    --card-active: #1a1a2e;
    --text: #e8e8f0;
    --text-dim: #6b6b80;
    --accent: #2dd4a0;
    --accent-glow: rgba(45, 212, 160, 0.15);
    --accent-b: #f5a623;
    --accent-b-glow: rgba(245, 166, 35, 0.15);
    --border: #1e1e2e;
    --settings-bg: #0e0e16;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .bg-grid {
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none; z-index: 0;
  }

  .container {
    position: relative; z-index: 1;
    max-width: 560px; margin: 0 auto; padding: 32px 20px;
  }

  header { text-align: center; margin-bottom: 28px; }

  header h1 {
    font-size: 1.1rem; font-weight: 300;
    letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--text-dim); margin-bottom: 8px;
  }

  .current-time {
    font-family: 'Space Mono', monospace;
    font-size: 2.8rem; font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent-b));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }

  /* Settings gear */
  .gear-btn {
    position: fixed; top: 18px; right: 18px; z-index: 100;
    width: 44px; height: 44px; border-radius: 12px;
    background: var(--card); border: 1px solid var(--border);
    color: var(--text-dim); font-size: 1.3rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.3s;
  }
  .gear-btn:hover { color: var(--accent); border-color: var(--accent); transform: rotate(45deg); }

  /* Settings panel */
  .settings-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    z-index: 200; display: none; align-items: center; justify-content: center;
    backdrop-filter: blur(6px);
  }
  .settings-overlay.open { display: flex; }

  .settings-panel {
    background: var(--settings-bg); border: 1px solid var(--border);
    border-radius: 20px; padding: 32px; width: 90%; max-width: 440px;
    max-height: 85vh; overflow-y: auto;
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .settings-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 28px;
  }
  .settings-header h2 { font-size: 1.3rem; font-weight: 700; }

  .close-btn {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--card); border: 1px solid var(--border);
    color: var(--text-dim); font-size: 1.2rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .close-btn:hover { color: var(--accent); border-color: var(--accent); }

  .setting-group { margin-bottom: 24px; }

  .setting-label {
    font-size: 0.7rem; font-weight: 600;
    letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--text-dim); margin-bottom: 10px;
  }

  .option-cards { display: flex; flex-direction: column; gap: 6px; }

  .option-card {
    padding: 12px 16px; border-radius: 10px;
    background: var(--card); border: 1px solid var(--border);
    cursor: pointer; transition: all 0.25s;
    display: flex; align-items: center; gap: 12px;
  }
  .option-card:hover { border-color: rgba(255,255,255,0.1); }
  .option-card.selected { border-color: var(--accent); background: var(--card-active); }

  .option-radio {
    width: 18px; height: 18px; border-radius: 50%;
    border: 2px solid var(--text-dim); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .option-card.selected .option-radio { border-color: var(--accent); }
  .option-card.selected .option-radio::after {
    content: ''; width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
  }

  .option-text { font-size: 0.9rem; font-weight: 500; }
  .option-sub { font-size: 0.75rem; color: var(--text-dim); margin-top: 2px; }

  /* Color pickers */
  .color-row { display: flex; gap: 12px; flex-wrap: wrap; }

  .color-pick { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .color-pick label { font-size: 0.75rem; color: var(--text-dim); font-weight: 400; }

  .color-pick input[type="color"] {
    width: 48px; height: 48px; border: 2px solid var(--border);
    border-radius: 12px; cursor: pointer; background: transparent;
    padding: 2px; transition: border-color 0.2s;
  }
  .color-pick input[type="color"]:hover { border-color: var(--accent); }

  .preset-row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }

  .preset-btn {
    padding: 6px 14px; border-radius: 8px;
    background: var(--card); border: 1px solid var(--border);
    color: var(--text); font-family: 'Outfit', sans-serif;
    font-size: 0.8rem; cursor: pointer; transition: all 0.2s;
  }
  .preset-btn:hover { border-color: var(--accent); }

  /* Toggle */
  .toggle-wrap { display: flex; justify-content: center; margin-bottom: 28px; }

  .toggle {
    display: flex; background: var(--card);
    border: 1px solid var(--border); border-radius: 12px; overflow: hidden;
  }

  .toggle-btn {
    padding: 10px 28px; font-family: 'Outfit', sans-serif;
    font-weight: 600; font-size: 0.95rem; border: none;
    background: transparent; color: var(--text-dim); cursor: pointer;
    transition: all 0.3s;
  }

  .toggle-btn.active-a {
    color: var(--bg); background: var(--accent);
    border-radius: 10px; box-shadow: 0 0 20px var(--accent-glow);
  }
  .toggle-btn.active-b {
    color: var(--bg); background: var(--accent-b);
    border-radius: 10px; box-shadow: 0 0 20px var(--accent-b-glow);
  }

  .toggle.hidden { display: none; }

  /* Hero */
  .hero {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 20px; padding: 36px 28px; text-align: center;
    margin-bottom: 32px; overflow: hidden; transition: box-shadow 0.5s;
  }
  .hero.glow-a { box-shadow: 0 0 60px -10px var(--accent-glow), inset 0 0 60px -30px var(--accent-glow); }
  .hero.glow-b { box-shadow: 0 0 60px -10px var(--accent-b-glow), inset 0 0 60px -30px var(--accent-b-glow); }

  .hero-label {
    font-size: 0.8rem; font-weight: 600;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--text-dim); margin-bottom: 8px;
  }
  .hero-period { font-size: 1.8rem; font-weight: 800; margin-bottom: 20px; }

  .hero-countdown {
    font-family: 'Space Mono', monospace;
    font-size: 3.6rem; font-weight: 700; line-height: 1; margin-bottom: 8px;
  }
  .hero-countdown.color-a { color: var(--accent); }
  .hero-countdown.color-b { color: var(--accent-b); }

  .hero-sub { font-size: 0.85rem; color: var(--text-dim); font-weight: 300; }

  .hero-progress { margin-top: 24px; height: 4px; background: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden; }
  .hero-progress-bar { height: 100%; border-radius: 4px; transition: width 1s linear; }
  .hero-progress-bar.bar-a { background: var(--accent); }
  .hero-progress-bar.bar-b { background: var(--accent-b); }

  .hero-countdown.urgent { animation: urgentFlash 1s ease-in-out infinite; }
  @keyframes urgentFlash { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .sched-type-label {
    text-align: center; margin-bottom: 8px;
    font-size: 0.75rem; font-weight: 600; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--accent); opacity: 0.7;
  }

  .schedule-label {
    font-size: 0.75rem; font-weight: 600;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--text-dim); margin-bottom: 12px;
  }

  .schedule { display: flex; flex-direction: column; gap: 6px; }

  .period-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px; background: var(--card);
    border: 1px solid var(--border); border-radius: 12px;
    transition: all 0.35s;
  }
  .period-row.is-active { background: var(--card-active); border-color: var(--accent); box-shadow: 0 0 20px -6px var(--accent-glow); }
  .period-row.is-active-b { border-color: var(--accent-b); box-shadow: 0 0 20px -6px var(--accent-b-glow); }
  .period-row.is-past { opacity: 0.35; }
  .period-row.is-lunch .period-name { font-weight: 400; color: var(--text-dim); }
  .period-row.is-note { opacity: 0.6; border-style: dashed; }

  .period-left { display: flex; align-items: center; gap: 14px; }

  .period-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--text-dim); flex-shrink: 0;
  }
  .period-row.is-active .period-dot { background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 2s ease-in-out infinite; }
  .period-row.is-active-b .period-dot { background: var(--accent-b) !important; box-shadow: 0 0 8px var(--accent-b) !important; }

  .period-name { font-weight: 600; font-size: 0.95rem; }
  .period-time { font-family: 'Space Mono', monospace; font-size: 0.8rem; color: var(--text-dim); }

  .no-school { text-align: center; padding: 60px 20px; }
  .no-school-emoji { font-size: 3rem; margin-bottom: 16px; }
  .no-school h2 { font-size: 1.4rem; font-weight: 600; margin-bottom: 8px; }
  .no-school p { color: var(--text-dim); font-weight: 300; }

  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.4)} }

  .settings-panel::-webkit-scrollbar { width: 6px; }
  .settings-panel::-webkit-scrollbar-track { background: transparent; }
  .settings-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<div class="bg-grid"></div>

<button class="gear-btn" onclick="openSettings()" title="Settings">&#9881;</button>

<div class="settings-overlay" id="settingsOverlay" onclick="if(event.target===this)closeSettings()">
  <div class="settings-panel">
    <div class="settings-header">
      <h2>Settings</h2>
      <button class="close-btn" onclick="closeSettings()">&#10005;</button>
    </div>

    <div class="setting-group">
      <div class="setting-label">Schedule Type</div>
      <div class="option-cards" id="scheduleOptions"></div>
    </div>

    <div class="setting-group" id="lunchGroup">
      <div class="setting-label">Lunch</div>
      <div class="option-cards" id="lunchOptions"></div>
    </div>

    <div class="setting-group">
      <div class="setting-label">Theme Colors</div>
      <div class="color-row">
        <div class="color-pick">
          <label>Primary</label>
          <input type="color" id="colorAccent" value="#2dd4a0" onchange="applyColor('accent',this.value)">
        </div>
        <div class="color-pick">
          <label>Secondary</label>
          <input type="color" id="colorAccentB" value="#f5a623" onchange="applyColor('accent-b',this.value)">
        </div>
        <div class="color-pick">
          <label>Background</label>
          <input type="color" id="colorBg" value="#0a0a0f" onchange="applyColor('bg',this.value)">
        </div>
        <div class="color-pick">
          <label>Cards</label>
          <input type="color" id="colorCard" value="#12121a" onchange="applyColor('card',this.value)">
        </div>
        <div class="color-pick">
          <label>Text</label>
          <input type="color" id="colorText" value="#e8e8f0" onchange="applyColor('text',this.value)">
        </div>
      </div>
      <div class="preset-row">
        <button class="preset-btn" onclick="applyPreset('default')">Default Dark</button>
        <button class="preset-btn" onclick="applyPreset('ocean')">Ocean</button>
        <button class="preset-btn" onclick="applyPreset('sunset')">Sunset</button>
        <button class="preset-btn" onclick="applyPreset('light')">Light</button>
        <button class="preset-btn" onclick="applyPreset('eagles')">Enloe Eagles</button>
      </div>
    </div>
  </div>
</div>

<div class="container">
  <header>
    <h1 id="schedTitle">Schedule</h1>
    <div class="current-time" id="clock"></div>
  </header>

  <div class="toggle-wrap" id="lunchToggleWrap">
    <div class="toggle" id="lunchToggle">
      <button class="toggle-btn active-a" id="btn-a" onclick="setLunch('A')">A Lunch</button>
      <button class="toggle-btn" id="btn-b" onclick="setLunch('B')">B Lunch</button>
    </div>
  </div>

  <div class="sched-type-label" id="schedTypeLabel"></div>
  <div id="hero-section"></div>

  <div class="schedule-label">Full Schedule</div>
  <div class="schedule" id="schedule"></div>
</div>

<script>
const SCHEDULES = {
  regular: {
    name: 'Regular',
    hasLunch: true,
    A: [
      { name: "1st Period",            start: "7:25",  end: "8:52" },
      { name: "Loe Down / 2nd Period", start: "8:58",  end: "10:35" },
      { name: "A Lunch",               start: "10:41", end: "11:16", lunch: true },
      { name: "3rd Period",            start: "11:20", end: "12:47" },
      { name: "4th Period",            start: "12:53", end: "14:20" },
    ],
    B: [
      { name: "1st Period",            start: "7:25",  end: "8:52" },
      { name: "Loe Down / 2nd Period", start: "8:58",  end: "10:35" },
      { name: "3rd Period",            start: "10:41", end: "12:08" },
      { name: "B Lunch",               start: "12:12", end: "12:47", lunch: true },
      { name: "4th Period",            start: "12:53", end: "14:20" },
    ]
  },
  homeroom: {
    name: 'Homeroom',
    hasLunch: true,
    A: [
      { name: "1st Period",  start: "7:25",  end: "8:50" },
      { name: "Homeroom",    start: "8:56",  end: "9:08" },
      { name: "2nd Period",  start: "9:14",  end: "10:39" },
      { name: "A Lunch",     start: "10:45", end: "11:20", lunch: true },
      { name: "3rd Period",  start: "11:24", end: "12:49" },
      { name: "4th Period",  start: "12:55", end: "14:20" },
    ],
    B: [
      { name: "1st Period",  start: "7:25",  end: "8:50" },
      { name: "Homeroom",    start: "8:56",  end: "9:08" },
      { name: "2nd Period",  start: "9:14",  end: "10:39" },
      { name: "3rd Period",  start: "10:45", end: "12:10" },
      { name: "B Lunch",     start: "12:14", end: "12:49", lunch: true },
      { name: "4th Period",  start: "12:55", end: "14:20" },
    ]
  },
  earlyRelease: {
    name: 'Early Release',
    hasLunch: false,
    A: [
      { name: "1st Period",          start: "7:25",  end: "8:30" },
      { name: "2nd Period",          start: "8:36",  end: "9:41" },
      { name: "3rd Period",          start: "9:47",  end: "10:52" },
      { name: "4th Period",          start: "10:58", end: "12:03" },
      { name: "Bag Lunch / Dismiss", start: "12:03", end: "12:20", note: true },
    ]
  }
};

let currentSchedule = 'regular';
let currentLunch = 'A';

function openSettings() { document.getElementById('settingsOverlay').classList.add('open'); buildSettingsUI(); }
function closeSettings() { document.getElementById('settingsOverlay').classList.remove('open'); }

function buildSettingsUI() {
  const schedOpts = document.getElementById('scheduleOptions');
  const types = [
    { key: 'regular',      label: 'Regular',       sub: '1st \u2192 Loe Down / 2nd \u2192 Lunch/3rd \u2192 4th' },
    { key: 'homeroom',     label: 'Homeroom',       sub: '1st \u2192 Homeroom \u2192 2nd \u2192 Lunch/3rd \u2192 4th' },
    { key: 'earlyRelease', label: 'Early Release',  sub: '1st \u2192 2nd \u2192 3rd \u2192 4th \u2192 12:20 Dismiss' },
  ];
  schedOpts.innerHTML = types.map(t => `
    <div class="option-card ${currentSchedule===t.key?'selected':''}" onclick="setSchedule('${t.key}')">
      <div class="option-radio"></div>
      <div><div class="option-text">${t.label}</div><div class="option-sub">${t.sub}</div></div>
    </div>`).join('');

  const lunchGroup = document.getElementById('lunchGroup');
  const hasLunch = SCHEDULES[currentSchedule].hasLunch;
  lunchGroup.style.display = hasLunch ? '' : 'none';

  if (hasLunch) {
    document.getElementById('lunchOptions').innerHTML = ['A','B'].map(l => `
      <div class="option-card ${currentLunch===l?'selected':''}" onclick="setLunch('${l}');buildSettingsUI()">
        <div class="option-radio"></div>
        <div class="option-text">${l} Lunch</div>
      </div>`).join('');
  }
}

function setSchedule(key) {
  currentSchedule = key;
  if (!SCHEDULES[key].hasLunch) currentLunch = 'A';
  saveState(); buildSettingsUI(); render();
}

function setLunch(type) {
  currentLunch = type;
  document.getElementById('btn-a').className = 'toggle-btn' + (type==='A' ? ' active-a' : '');
  document.getElementById('btn-b').className = 'toggle-btn' + (type==='A' ? '' : ' active-b');
  saveState(); render();
}

function hexToRgba(hex, a) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function applyColor(key, val) {
  const r = document.documentElement.style;
  if (key==='accent')   { r.setProperty('--accent',val); r.setProperty('--accent-glow',hexToRgba(val,0.15)); }
  if (key==='accent-b') { r.setProperty('--accent-b',val); r.setProperty('--accent-b-glow',hexToRgba(val,0.15)); }
  if (key==='bg')       { r.setProperty('--bg',val); r.setProperty('--settings-bg',val); }
  if (key==='card')     { r.setProperty('--card',val); r.setProperty('--card-active',val); }
  if (key==='text')     { r.setProperty('--text',val); }
  saveState();
}

const PRESETS = {
  default: { accent:'#2dd4a0', accentB:'#f5a623', bg:'#0a0a0f', card:'#12121a', text:'#e8e8f0' },
  ocean:   { accent:'#00b4d8', accentB:'#90e0ef', bg:'#03071e', card:'#0a1128', text:'#caf0f8' },
  sunset:  { accent:'#ff6b6b', accentB:'#feca57', bg:'#1a1a2e', card:'#22223b', text:'#fdf6ec' },
  light:   { accent:'#0ea5e9', accentB:'#f59e0b', bg:'#f8f9fb', card:'#ffffff', text:'#1e293b' },
  eagles:  { accent:'#c8102e', accentB:'#f0b323', bg:'#0c1421', card:'#13202f', text:'#f0f0f0' },
};

function applyPreset(name) {
  const p = PRESETS[name];
  applyColor('accent',p.accent);   document.getElementById('colorAccent').value=p.accent;
  applyColor('accent-b',p.accentB); document.getElementById('colorAccentB').value=p.accentB;
  applyColor('bg',p.bg);           document.getElementById('colorBg').value=p.bg;
  applyColor('card',p.card);       document.getElementById('colorCard').value=p.card;
  applyColor('text',p.text);       document.getElementById('colorText').value=p.text;
}

// Persist via URL hash (works on GitHub Pages, no localStorage needed)
function saveState() {
  const s = {
    sc: currentSchedule, lu: currentLunch,
    c1: document.getElementById('colorAccent').value,
    c2: document.getElementById('colorAccentB').value,
    bg: document.getElementById('colorBg').value,
    cd: document.getElementById('colorCard').value,
    tx: document.getElementById('colorText').value,
  };
  try { window.location.hash = btoa(JSON.stringify(s)); } catch(e){}
}

function loadState() {
  try {
    const h = window.location.hash.slice(1); if(!h) return;
    const s = JSON.parse(atob(h));
    if(s.sc) currentSchedule=s.sc;
    if(s.lu) currentLunch=s.lu;
    if(s.c1){applyColor('accent',s.c1);document.getElementById('colorAccent').value=s.c1;}
    if(s.c2){applyColor('accent-b',s.c2);document.getElementById('colorAccentB').value=s.c2;}
    if(s.bg){applyColor('bg',s.bg);document.getElementById('colorBg').value=s.bg;}
    if(s.cd){applyColor('card',s.cd);document.getElementById('colorCard').value=s.cd;}
    if(s.tx){applyColor('text',s.tx);document.getElementById('colorText').value=s.tx;}
  } catch(e){}
}

function toMin(t){const[h,m]=t.split(':').map(Number);return h*60+m;}
function nowMin(){const d=new Date();return d.getHours()*60+d.getMinutes()+d.getSeconds()/60;}
function fmtCountdown(s){
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
  const p=n=>String(n).padStart(2,'0');
  return h>0?`${h}:${p(m)}:${p(sec)}`:`${p(m)}:${p(sec)}`;
}
function fmtTime12(t){
  let[h,m]=t.split(':').map(Number);const ap=h>=12?'PM':'AM';
  if(h>12)h-=12;if(h===0)h=12;
  return `${h}:${String(m).padStart(2,'0')} ${ap}`;
}

function getSchedule(){
  const s=SCHEDULES[currentSchedule];
  return s.hasLunch?s[currentLunch]:s.A;
}

function render(){
  const schedule=getSchedule();
  const sData=SCHEDULES[currentSchedule];
  const isA=currentLunch==='A';
  const now=nowMin();
  const nd=new Date();
  const nowSec=nd.getHours()*3600+nd.getMinutes()*60+nd.getSeconds();

  document.getElementById('schedTitle').textContent=sData.name+' Schedule';
  document.getElementById('schedTypeLabel').textContent='Enloe High School \u2014 '+sData.name;
  const toggleEl=document.getElementById('lunchToggle');
  toggleEl.className=sData.hasLunch?'toggle':'toggle hidden';

  if(sData.hasLunch){
    document.getElementById('btn-a').className='toggle-btn'+(isA?' active-a':'');
    document.getElementById('btn-b').className='toggle-btn'+(isA?'':' active-b');
  }

  let activeIdx=-1,betweenPeriods=false,nextIdx=-1;
  for(let i=0;i<schedule.length;i++){
    if(schedule[i].note)continue;
    if(now>=toMin(schedule[i].start)&&now<toMin(schedule[i].end)){activeIdx=i;break;}
  }
  if(activeIdx===-1){
    for(let i=0;i<schedule.length-1;i++){
      const e=toMin(schedule[i].end),s2=toMin(schedule[i+1].start);
      if(now>=e&&now<s2){betweenPeriods=true;nextIdx=i+1;break;}
    }
  }

  const heroEl=document.getElementById('hero-section');
  const ac=isA?'a':'b';

  if(activeIdx!==-1){
    const p=schedule[activeIdx];
    const ss=toMin(p.start)*60,es=toMin(p.end)*60;
    const rem=es-nowSec,total=es-ss;
    const pct=((nowSec-ss)/total*100).toFixed(1);
    const urg=rem<=300;
    const cd=fmtCountdown(Math.max(0,rem));
    document.title=`${cd} \u2014 ${p.name}`;
    heroEl.innerHTML=`
      <div class="hero glow-${ac}">
        <div class="hero-label">Currently In</div>
        <div class="hero-period">${p.name}</div>
        <div class="hero-countdown color-${ac} ${urg?'urgent':''}">${cd}</div>
        <div class="hero-sub">${fmtTime12(p.start)} \u2014 ${fmtTime12(p.end)}</div>
        <div class="hero-progress"><div class="hero-progress-bar bar-${ac}" style="width:${pct}%"></div></div>
      </div>`;
  } else if(betweenPeriods){
    const np=schedule[nextIdx];
    const rem=toMin(np.start)*60-nowSec;
    const cd=fmtCountdown(Math.max(0,rem));
    document.title=`${cd} \u2014 Passing`;
    heroEl.innerHTML=`
      <div class="hero glow-${ac}">
        <div class="hero-label">Passing Period</div>
        <div class="hero-period">Next: ${np.name}</div>
        <div class="hero-countdown color-${ac}">${cd}</div>
        <div class="hero-sub">Starts at ${fmtTime12(np.start)}</div>
      </div>`;
  } else if(now<toMin(schedule[0].start)){
    const rem=toMin(schedule[0].start)*60-nowSec;
    const cd=fmtCountdown(Math.max(0,rem));
    document.title=`${cd} \u2014 Before School`;
    heroEl.innerHTML=`
      <div class="hero glow-${ac}">
        <div class="hero-label">School Starts In</div>
        <div class="hero-period">${schedule[0].name}</div>
        <div class="hero-countdown color-${ac}">${cd}</div>
        <div class="hero-sub">Starts at ${fmtTime12(schedule[0].start)}</div>
      </div>`;
  } else {
    document.title="School's Out!";
    heroEl.innerHTML=`
      <div class="no-school">
        <div class="no-school-emoji">\uD83C\uDF89</div>
        <h2>School's Out!</h2>
        <p>No more classes today. Enjoy your evening!</p>
      </div>`;
  }

  document.getElementById('schedule').innerHTML=schedule.map((p,i)=>{
    const s=toMin(p.start),e=toMin(p.end);
    const isAct=i===activeIdx;
    const isPast=now>=e&&!isAct;
    let cls='period-row';
    if(isAct)cls+=` is-active${isA?'':' is-active-b'}`;
    if(isPast)cls+=' is-past';
    if(p.lunch)cls+=' is-lunch';
    if(p.note)cls+=' is-note';
    return `<div class="${cls}">
      <div class="period-left">
        <div class="period-dot"></div>
        <div class="period-name">${p.name}</div>
      </div>
      <div class="period-time">${fmtTime12(p.start)} \u2013 ${fmtTime12(p.end)}</div>
    </div>`;
  }).join('');
}

function updateClock(){
  const d=new Date();
  let h=d.getHours();const m=String(d.getMinutes()).padStart(2,'0'),s=String(d.getSeconds()).padStart(2,'0');
  const ap=h>=12?'PM':'AM';if(h>12)h-=12;if(h===0)h=12;
  document.getElementById('clock').textContent=`${h}:${m}:${s} ${ap}`;
}

function tick(){updateClock();render();}

loadState();
tick();
setInterval(tick,1000);
</script>
</body>
</html>
