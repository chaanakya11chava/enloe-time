<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --card: #12121a;
    --card-active: #1a1a2e;
    --text: #e8e8f0;
    --text-dim: #6b6b80;
    --accent-a: #2dd4a0;
    --accent-b: #f5a623;
    --accent-glow-a: rgba(45, 212, 160, 0.15);
    --accent-glow-b: rgba(245, 166, 35, 0.15);
    --danger: #ff4757;
    --border: #1e1e2e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .bg-grid {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 560px;
    margin: 0 auto;
    padding: 32px 20px;
  }

  header {
    text-align: center;
    margin-bottom: 36px;
  }

  header h1 {
    font-size: 1.1rem;
    font-weight: 300;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .current-time {
    font-family: 'Space Mono', monospace;
    font-size: 2.8rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent-a), var(--accent-b));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* Toggle */
  .toggle-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 32px;
  }

  .toggle {
    display: flex;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    position: relative;
  }

  .toggle-btn {
    padding: 10px 28px;
    font-family: 'Outfit', sans-serif;
    font-weight: 600;
    font-size: 0.95rem;
    border: none;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    z-index: 1;
  }

  .toggle-btn.active-a {
    color: var(--bg);
    background: var(--accent-a);
    border-radius: 10px;
    box-shadow: 0 0 20px var(--accent-glow-a);
  }

  .toggle-btn.active-b {
    color: var(--bg);
    background: var(--accent-b);
    border-radius: 10px;
    box-shadow: 0 0 20px var(--accent-glow-b);
  }

  /* Hero / active period */
  .hero {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 28px;
    text-align: center;
    margin-bottom: 32px;
    position: relative;
    overflow: hidden;
    transition: box-shadow 0.5s ease;
  }

  .hero.glow-a {
    box-shadow: 0 0 60px -10px var(--accent-glow-a), inset 0 0 60px -30px var(--accent-glow-a);
  }

  .hero.glow-b {
    box-shadow: 0 0 60px -10px var(--accent-glow-b), inset 0 0 60px -30px var(--accent-glow-b);
  }

  .hero-label {
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .hero-period {
    font-size: 1.8rem;
    font-weight: 800;
    margin-bottom: 20px;
  }

  .hero-countdown {
    font-family: 'Space Mono', monospace;
    font-size: 3.6rem;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 8px;
  }

  .hero-countdown.color-a { color: var(--accent-a); }
  .hero-countdown.color-b { color: var(--accent-b); }

  .hero-sub {
    font-size: 0.85rem;
    color: var(--text-dim);
    font-weight: 300;
  }

  .hero-progress {
    margin-top: 24px;
    height: 4px;
    background: rgba(255,255,255,0.06);
    border-radius: 4px;
    overflow: hidden;
  }

  .hero-progress-bar {
    height: 100%;
    border-radius: 4px;
    transition: width 1s linear;
  }

  .hero-progress-bar.bar-a { background: var(--accent-a); }
  .hero-progress-bar.bar-b { background: var(--accent-b); }

  /* Schedule list */
  .schedule-label {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 12px;
  }

  .schedule {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .period-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    transition: all 0.35s ease;
  }

  .period-row.is-active {
    background: var(--card-active);
    border-color: var(--accent-a);
    box-shadow: 0 0 20px -6px var(--accent-glow-a);
  }

  .period-row.is-active-b {
    border-color: var(--accent-b);
    box-shadow: 0 0 20px -6px var(--accent-glow-b);
  }

  .period-row.is-past {
    opacity: 0.35;
  }

  .period-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .period-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--text-dim);
    flex-shrink: 0;
  }

  .period-row.is-active .period-dot {
    background: var(--accent-a);
    box-shadow: 0 0 8px var(--accent-a);
    animation: pulse 2s ease-in-out infinite;
  }

  .period-row.is-active-b .period-dot {
    background: var(--accent-b) !important;
    box-shadow: 0 0 8px var(--accent-b) !important;
  }

  .period-row.is-lunch .period-name { font-weight: 400; color: var(--text-dim); }

  .period-name {
    font-weight: 600;
    font-size: 0.95rem;
  }

  .period-time {
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    color: var(--text-dim);
  }

  .no-school {
    text-align: center;
    padding: 60px 20px;
  }

  .no-school-emoji {
    font-size: 3rem;
    margin-bottom: 16px;
  }

  .no-school h2 {
    font-size: 1.4rem;
    font-weight: 600;
    margin-bottom: 8px;
  }

  .no-school p {
    color: var(--text-dim);
    font-weight: 300;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.4); }
  }

  /* Urgent flash */
  .hero-countdown.urgent {
    animation: urgentFlash 1s ease-in-out infinite;
  }

  @keyframes urgentFlash {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .between-label {
    color: var(--accent-b);
    font-size: 0.85rem;
    font-weight: 400;
  }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="container">
  <header>
    <h1>Schedule</h1>
    <div class="current-time" id="clock"></div>
  </header>

  <div class="toggle-wrap">
    <div class="toggle">
      <button class="toggle-btn active-a" id="btn-a" onclick="setLunch('A')">A Lunch</button>
      <button class="toggle-btn" id="btn-b" onclick="setLunch('B')">B Lunch</button>
    </div>
  </div>

  <div id="hero-section"></div>

  <div class="schedule-label">Full Schedule</div>
  <div class="schedule" id="schedule"></div>
</div>

<script>
const SCHEDULE_A = [
  { name: "1st Period",    start: "7:25",  end: "8:52"  },
  { name: "Loe Down / 2nd Period", start: "8:58",  end: "10:35" },
  { name: "A Lunch",       start: "10:41", end: "11:16", lunch: true },
  { name: "3rd Period",    start: "11:20", end: "12:47" },
  { name: "4th Period",    start: "12:53", end: "14:20" },
];

const SCHEDULE_B = [
  { name: "1st Period",    start: "7:25",  end: "8:52"  },
  { name: "Loe Down / 2nd Period", start: "8:58",  end: "10:35" },
  { name: "3rd Period",    start: "10:41", end: "12:08" },
  { name: "B Lunch",       start: "12:12", end: "12:47", lunch: true },
  { name: "4th Period",    start: "12:53", end: "14:20" },
];

let currentLunch = 'A';

function setLunch(type) {
  currentLunch = type;
  document.getElementById('btn-a').className = 'toggle-btn' + (type === 'A' ? ' active-a' : '');
  document.getElementById('btn-b').className = 'toggle-btn' + (type === 'B' ? ' active-b' : '');
  render();
}

function toMin(timeStr) {
  const [h, m] = timeStr.split(':').map(Number);
  return h * 60 + m;
}

function nowMin() {
  const d = new Date();
  return d.getHours() * 60 + d.getMinutes() + d.getSeconds() / 60;
}

function fmtCountdown(totalSec) {
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  const pad = n => String(n).padStart(2, '0');
  return h > 0 ? `${h}:${pad(m)}:${pad(s)}` : `${pad(m)}:${pad(s)}`;
}

function fmtTime12(timeStr) {
  let [h, m] = timeStr.split(':').map(Number);
  const ampm = h >= 12 ? 'PM' : 'AM';
  if (h > 12) h -= 12;
  if (h === 0) h = 12;
  return `${h}:${String(m).padStart(2,'0')} ${ampm}`;
}

function render() {
  const schedule = currentLunch === 'A' ? SCHEDULE_A : SCHEDULE_B;
  const isA = currentLunch === 'A';
  const now = nowMin();
  const nowDate = new Date();
  const nowSec = nowDate.getHours() * 3600 + nowDate.getMinutes() * 60 + nowDate.getSeconds();

  let activeIdx = -1;
  let betweenPeriods = false;
  let nextIdx = -1;

  for (let i = 0; i < schedule.length; i++) {
    const s = toMin(schedule[i].start);
    const e = toMin(schedule[i].end);
    if (now >= s && now < e) { activeIdx = i; break; }
  }

  if (activeIdx === -1) {
    for (let i = 0; i < schedule.length - 1; i++) {
      const e = toMin(schedule[i].end);
      const s2 = toMin(schedule[i + 1].start);
      if (now >= e && now < s2) {
        betweenPeriods = true;
        nextIdx = i + 1;
        break;
      }
    }
  }

  // Hero
  const heroEl = document.getElementById('hero-section');
  const accentClass = isA ? 'a' : 'b';

  if (activeIdx !== -1) {
    const p = schedule[activeIdx];
    const startSec = toMin(p.start) * 60;
    const endSec = toMin(p.end) * 60;
    const remaining = endSec - nowSec;
    const total = endSec - startSec;
    const pct = ((nowSec - startSec) / total * 100).toFixed(1);
    const urgent = remaining <= 300;
    const countdownStr = fmtCountdown(Math.max(0, remaining));

    document.title = `${countdownStr} — ${p.name}`;

    heroEl.innerHTML = `
      <div class="hero glow-${accentClass}">
        <div class="hero-label">Currently In</div>
        <div class="hero-period">${p.name}</div>
        <div class="hero-countdown color-${accentClass} ${urgent ? 'urgent' : ''}">${countdownStr}</div>
        <div class="hero-sub">${fmtTime12(p.start)} — ${fmtTime12(p.end)}</div>
        <div class="hero-progress"><div class="hero-progress-bar bar-${accentClass}" style="width:${pct}%"></div></div>
      </div>`;
  } else if (betweenPeriods) {
    const np = schedule[nextIdx];
    const nextStartSec = toMin(np.start) * 60;
    const remaining = nextStartSec - nowSec;
    const countdownStr = fmtCountdown(Math.max(0, remaining));

    document.title = `${countdownStr} — Passing`;

    heroEl.innerHTML = `
      <div class="hero glow-${accentClass}">
        <div class="hero-label">Passing Period</div>
        <div class="hero-period">Next: ${np.name}</div>
        <div class="hero-countdown color-${accentClass}">${countdownStr}</div>
        <div class="hero-sub">Starts at ${fmtTime12(np.start)}</div>
      </div>`;
  } else if (now < toMin(schedule[0].start)) {
    const firstStartSec = toMin(schedule[0].start) * 60;
    const remaining = firstStartSec - nowSec;
    const countdownStr = fmtCountdown(Math.max(0, remaining));

    document.title = `${countdownStr} — Before School`;

    heroEl.innerHTML = `
      <div class="hero glow-${accentClass}">
        <div class="hero-label">School Starts In</div>
        <div class="hero-period">${schedule[0].name}</div>
        <div class="hero-countdown color-${accentClass}">${countdownStr}</div>
        <div class="hero-sub">Starts at ${fmtTime12(schedule[0].start)}</div>
      </div>`;
  } else {
    document.title = 'School\'s Out!';
    heroEl.innerHTML = `
      <div class="no-school">
        <div class="no-school-emoji">🎉</div>
        <h2>School's Out!</h2>
        <p>No more classes today. Enjoy your evening!</p>
      </div>`;
  }

  // Schedule list
  const listEl = document.getElementById('schedule');
  listEl.innerHTML = schedule.map((p, i) => {
    const s = toMin(p.start);
    const e = toMin(p.end);
    const isActive = i === activeIdx;
    const isPast = now >= e && !isActive;
    let cls = 'period-row';
    if (isActive) cls += ` is-active${isA ? '' : ' is-active-b'}`;
    if (isPast) cls += ' is-past';
    if (p.lunch) cls += ' is-lunch';

    return `<div class="${cls}">
      <div class="period-left">
        <div class="period-dot"></div>
        <div class="period-name">${p.name}</div>
      </div>
      <div class="period-time">${fmtTime12(p.start)} – ${fmtTime12(p.end)}</div>
    </div>`;
  }).join('');
}

function updateClock() {
  const d = new Date();
  const h = d.getHours();
  const m = String(d.getMinutes()).padStart(2, '0');
  const s = String(d.getSeconds()).padStart(2, '0');
  const h12 = h > 12 ? h - 12 : (h === 0 ? 12 : h);
  const ampm = h >= 12 ? 'PM' : 'AM';
  document.getElementById('clock').textContent = `${h12}:${m}:${s} ${ampm}`;
}

function tick() {
  updateClock();
  render();
}

tick();
setInterval(tick, 1000);
</script>
</body>
</html>
